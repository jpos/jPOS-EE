hibernate.connection.provider_class=org.hibernate.agroal.internal.AgroalConnectionProvider
hibernate.connection.username=${db.username}
hibernate.connection.password=${db.password}
hibernate.connection.url=${db.connection}}
hibernate.connection.driver_class=${db.driver}
hibernate.connection.pool_size=100
hibernate.agroal.minSize=1
hibernate.agroal.maxSize=8

